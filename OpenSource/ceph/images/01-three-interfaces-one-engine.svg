<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="780" viewBox="0 0 1320 780" role="img" aria-labelledby="title desc">
  <title id="title">Ceph 三种典型使用场景共享同一底座</title>
  <desc id="desc">左中右三列分别展示 RBD、CephFS、RGW 的典型业务视角，底部汇聚到同一个 RADOS 与 OSD 集群。</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .col { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .rbd { fill: #ecfccb; stroke: #84cc16; stroke-width: 2; }
      .cephfs { fill: #eef2ff; stroke: #818cf8; stroke-width: 2; }
      .rgw { fill: #fff7ed; stroke: #fb923c; stroke-width: 2; }
      .rados { fill: #dbeafe; stroke: #3b82f6; stroke-width: 3; }
      .osd { fill: #dcfce7; stroke: #22c55e; stroke-width: 2; }
      .note { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; }
      .line { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .text-dark { fill: #0f172a; font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .text-muted { fill: #334155; font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .title { font-size: 34px; font-weight: 700; }
      .box-title { font-size: 22px; font-weight: 700; }
      .body { font-size: 18px; }
      .small { font-size: 16px; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1320" height="780"/>
  <text class="text-dark title" x="660" y="56" text-anchor="middle">三种上层形态，共享同一个分布式存储发动机</text>

  <rect class="col" x="60" y="100" rx="20" ry="20" width="360" height="420"/>
  <rect class="rbd" x="90" y="132" rx="16" ry="16" width="300" height="84"/>
  <text class="text-dark box-title" x="240" y="167" text-anchor="middle">场景一：云硬盘 / 虚拟机磁盘</text>
  <text class="text-muted body" x="240" y="196" text-anchor="middle">业务看到的是块设备语义</text>
  <rect class="note" x="90" y="242" rx="14" ry="14" width="300" height="82"/>
  <text class="text-dark body" x="240" y="276" text-anchor="middle">RBD</text>
  <text class="text-muted small" x="240" y="302" text-anchor="middle">把逻辑镜像拆成很多对象</text>
  <rect class="note" x="90" y="344" rx="14" ry="14" width="300" height="118"/>
  <text class="text-muted body" x="240" y="378" text-anchor="middle">上层语义</text>
  <text class="text-muted small" x="240" y="406" text-anchor="middle">随机偏移读写</text>
  <text class="text-muted small" x="240" y="430" text-anchor="middle">快照 / 克隆 / 映射为块设备</text>

  <rect class="col" x="480" y="100" rx="20" ry="20" width="360" height="420"/>
  <rect class="cephfs" x="510" y="132" rx="16" ry="16" width="300" height="84"/>
  <text class="text-dark box-title" x="660" y="167" text-anchor="middle">场景二：共享文件系统</text>
  <text class="text-muted body" x="660" y="196" text-anchor="middle">业务看到的是目录和文件</text>
  <rect class="note" x="510" y="242" rx="14" ry="14" width="300" height="82"/>
  <text class="text-dark body" x="660" y="276" text-anchor="middle">CephFS + MDS</text>
  <text class="text-muted small" x="660" y="302" text-anchor="middle">把文件数据落到 RADOS，元数据单独协调</text>
  <rect class="note" x="510" y="344" rx="14" ry="14" width="300" height="118"/>
  <text class="text-muted body" x="660" y="378" text-anchor="middle">上层语义</text>
  <text class="text-muted small" x="660" y="406" text-anchor="middle">目录树 / inode / dentry</text>
  <text class="text-muted small" x="660" y="430" text-anchor="middle">共享挂载 / rename / 一致性协调</text>

  <rect class="col" x="900" y="100" rx="20" ry="20" width="360" height="420"/>
  <rect class="rgw" x="930" y="132" rx="16" ry="16" width="300" height="84"/>
  <text class="text-dark box-title" x="1080" y="167" text-anchor="middle">场景三：S3 兼容对象存储</text>
  <text class="text-muted body" x="1080" y="196" text-anchor="middle">业务看到的是桶和对象</text>
  <rect class="note" x="930" y="242" rx="14" ry="14" width="300" height="82"/>
  <text class="text-dark body" x="1080" y="276" text-anchor="middle">RGW</text>
  <text class="text-muted small" x="1080" y="302" text-anchor="middle">对外提供 HTTP / S3 / Swift 风格接口</text>
  <rect class="note" x="930" y="344" rx="14" ry="14" width="300" height="118"/>
  <text class="text-muted body" x="1080" y="378" text-anchor="middle">上层语义</text>
  <text class="text-muted small" x="1080" y="406" text-anchor="middle">bucket / object / ACL / multipart</text>
  <text class="text-muted small" x="1080" y="430" text-anchor="middle">鉴权 / 生命周期 / 多租户</text>

  <path class="line" d="M240 520 L240 584 L660 584"/>
  <path class="line" d="M660 520 L660 584"/>
  <path class="line" d="M1080 520 L1080 584 L660 584"/>

  <rect class="rados" x="360" y="584" rx="22" ry="22" width="600" height="96"/>
  <text class="text-dark box-title" x="660" y="624" text-anchor="middle">统一底座：RADOS</text>
  <text class="text-muted body" x="660" y="654" text-anchor="middle">不管上层是块、文件还是 S3，对象最终都进入同一个分布式对象存储底座</text>

  <path class="line" d="M660 680 L660 720"/>

  <rect class="osd" x="340" y="720" rx="14" ry="14" width="180" height="38"/>
  <text class="text-dark body" x="430" y="745" text-anchor="middle">OSD 1</text>
  <rect class="osd" x="570" y="720" rx="14" ry="14" width="180" height="38"/>
  <text class="text-dark body" x="660" y="745" text-anchor="middle">OSD 2</text>
  <rect class="osd" x="800" y="720" rx="14" ry="14" width="180" height="38"/>
  <text class="text-dark body" x="890" y="745" text-anchor="middle">OSD 3</text>

  <rect class="note" x="310" y="690" rx="16" ry="16" width="700" height="56"/>
  <text class="text-dark body" x="660" y="725" text-anchor="middle">差别主要在访问语义，不在底层可靠性引擎</text>
</svg>
